<div
  class="w-full max-w-sm p-4 border rounded-lg shadow sm:p-6 md:p-8 bg-gray-900 border-gray-700 mx-auto my-10"
>
  <form
    [formGroup]="addTaskForm"
    (ngSubmit)="addTask()"
    class="space-y-6"
    action="#"
  >
    <h5 class="text-xl font-medium text-white">Add task</h5>
    <div>
      <label for="title" class="block mb-2 text-sm font-medium text-white"
        >Task title</label
      >
      <input
        (ngModelChange)="withValue()"
        formControlName="title"
        type="text"
        name="title"
        id="title"
        [ngClass]="{
          'border-red-600': hasErrors('title', 'required') || submitted
        }"
        class="border text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 bg-gray-600 border-gray-500 placeholder-gray-400 text-white"
      />
      <div *ngIf="hasErrors('title', 'required') || submitted">
        <p class="text-red-600">Title is required</p>
      </div>
    </div>
    <button
      type="submit"
      class="w-full text-white focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center bg-blue-600 hover:bg-blue-700 focus:ring-blue-800"
    >
      Add task
    </button>
  </form>
</div>
